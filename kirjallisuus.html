<!doctype html>
<html lang="fi">
  <head>
    <title>Kirjallisuus</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="UTF-8" />
    <meta name="author" content="Niina" />
    <!-- lisää meta-elementtejä -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playwrite+NZ+Basic:wght@100..400&family=Roboto+Slab:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <link href="style.css" rel="stylesheet" type="text/css" />
  </head>
  <body>
    <!-- Sivun yhtenäinen ulkomarginaali kaikilla sivuilla <div class="page">-->
    <!-- Ylätunniste: logo + navigaatio -->

    <div class="header-container">
      <img class="logo" src="Logo.png" alt="Logo Metsäkylpy" />
      <button
        class="hamburger-btn"
        id="hamburger"
        aria-label="Toggle navigation"
        type="button"
      >
        <span class="bar"></span>
        <span class="bar"></span>
        <span class="bar"></span>
      </button>
      <header>
        <nav class="header-navigation" id="nav-menu" aria-label="Päänavigaatio">
          <ul class="header-text-navigation">
            <li><a href="./">Kotisivu</a></li>
            <li>
              <a href="hyvinvointivaikutukset">Hyvinvointivaikutukset</a>
            </li>
            <li><a href="kirjallisuus">Kirjallisuus</a></li>
            <li><a href="tarinani">Tarinani</a></li>
          </ul>
        </nav>
        <script>
          // Hamburger menu toggle
          const hamburger = document.getElementById("hamburger");
          const navMenu = document.getElementById("nav-menu");

          hamburger.addEventListener("click", () => {
            navMenu.classList.toggle("active");
            hamburger.classList.toggle("active");
          });

          // Close menu when link is clicked
          document.querySelectorAll(".header-navigation a").forEach((link) => {
            link.addEventListener("click", () => {
              navMenu.classList.remove("active");
              hamburger.classList.remove("active");
            });
          });
        </script>
      </header>
    </div>

    <!-- POIS ylimääräiset? <div class="container">
        <section class="section">  -->

    <!-- Leveä bannerikuva (Kuva0) -->
    <div class="banneri-container">
      <img src="Kuva0.jpg" alt="Kanto metsässä" />
    </div>

    <!-- Pääsisältö -->
    <main>
      <footer>
        <div class="footer-container">
          <div class="footer-text-container">
            Niina <br />
            niina@sähköposti.fi <br />
            Tampere <br />
          </div>
          <img class="logo" src="Logo.png" alt="Logo Metsäkylpy" />
        </div>
      </footer>
    </main>
  </body>
</html>
